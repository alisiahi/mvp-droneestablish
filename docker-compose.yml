services:
  # 1. DATABASE (Shared by Backend and Keycloak)
  db:
    image: postgres:15
    container_name: kiwi_bvl_db
    restart: always
    environment:
      POSTGRES_USER: kiwi_user
      POSTGRES_PASSWORD: kiwi_password
      POSTGRES_DB: bvl_data
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. IAM (Keycloak)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0 # Latest stable in 2026
    container_name: kiwi_keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/bvl_data
      KC_DB_USERNAME: kiwi_user
      KC_DB_PASSWORD: kiwi_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Enable dynamic hostname resolution via proxy headers
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /auth
    depends_on:
      - db
    volumes:
      - ./keycloak/kiwi-realm-export.json:/opt/keycloak/data/import/realm.json
      - ./data/keycloak_data:/opt/keycloak/data

  # 3. STORAGE (MinIO)
  minio:
    image: quay.io/minio/minio
    container_name: kiwi_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminpassword
    volumes:
      - ./data/minio_data:/data

  # 4. BACKEND (Python)
  backend:
    build: ./backend
    container_name: kiwi_backend
    restart: always
    depends_on:
      - db
      - minio
    environment:
      - DATABASE_URL=postgresql://kiwi_user:kiwi_password@db:5432/bvl_data
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=adminpassword
      - KEYCLOAK_URL=http://keycloak:8080
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-localhost}
      - HTTP_SCHEME=${HTTP_SCHEME:-https}

  # 5. FRONTEND (Next.js)
  frontend:
    build: ./frontend
    container_name: kiwi_frontend
    restart: always
    depends_on:
      - backend
    environment:
      - AUTH_KEYCLOAK_ISSUER=${HTTP_SCHEME:-https}://${PUBLIC_DOMAIN:-localhost}/auth/realms/kiwi-realm
      - AUTH_URL=${HTTP_SCHEME:-https}://${PUBLIC_DOMAIN:-localhost}
      - AUTH_TRUST_HOST=true
      - AUTH_KEYCLOAK_INTERNAL_ISSUER=http://keycloak:8080/auth/realms/kiwi-realm

  # 6. pgAdmin
  pgadmin:
    build: ./pgadmin
    container_name: kiwi_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kiwi.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      - db

  # 7. NGINX Reverse Proxy
  nginx:
    build: ./nginx
    container_name: kiwi_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-localhost}
    volumes:
      - ./data/nginx_ssl:/etc/nginx/ssl
      - ./data/letsencrypt:/etc/letsencrypt
      - ./data/certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend
      - keycloak
      - minio
      - pgadmin
